<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="card shadow border-success">
        <div class="card-header bg-success text-white text-center py-3">
          <h3 class="mb-0">🌱 SmartAgri Login</h3>
        </div>

        <div class="card-body p-4" [appLoadingSpinner]="loading">
          <form [formGroup]="loginForm" (ngSubmit)="onLogin()" novalidate>

          @if (errorMessage) {
            <div class="alert alert-danger py-2" role="alert">
              {{ errorMessage }}
            </div>
          }

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input
              id="username"
              type="text"
              class="form-control"
              placeholder="Enter username"
              formControlName="username"
              appTrimInput
              [appDisableWhileLoading]="loading"
              aria-label="Username"
            />
            <div
              [appFormError]="loginForm.controls.username"
              [appFormErrorMessages]="{ required: 'Username is required.' }"
            ></div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              id="password"
              type="password"
              class="form-control"
              placeholder="Enter password"
              formControlName="password"
              appTrimInput
              [appDisableWhileLoading]="loading"
              (keyup.enter)="onLogin()"
              aria-label="Password"
            />
            <div
              [appFormError]="loginForm.controls.password"
              [appFormErrorMessages]="{ required: 'Password is required.' }"
            ></div>
          </div>

          <button
            type="submit"
            class="btn btn-success w-100"
            [appDisableWhileLoading]="loading"
            aria-label="Submit login"
          >
            @if (loading) {
              <span class="spinner-border spinner-border-sm me-2"></span>
              Logging in...
            } @else {
              Login
            }
          </button>
          </form>

        </div>

        <div class="card-footer text-center text-muted small py-3">
          Don't have an account? Contact your administrator.
        </div>
      </div>

      <div class="text-center mt-3">
        <a routerLink="/" class="text-muted small">← Back to Home</a>
      </div>

    </div>
  </div>
</div>
