<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h2 class="text-success mb-0">
      @if (isEditMode) {
        ✏️ Edit Farm
      } @else {
        ➕ Add New Farm
      }
    </h2>
    <a routerLink="/farms" class="btn btn-outline-secondary btn-sm">← Back to Farms</a>
  </div>

  @if (loading) {
    <div class="alert alert-info">⏳ Loading farm details...</div>
  }

  @if (errorMessage) {
    <div class="alert alert-danger" role="alert">{{ errorMessage }}</div>
  }

  @if (!loading) {
    <div class="card shadow-sm border-success">
      <div class="card-body p-4" [appLoadingSpinner]="submitting || loading">
        <form [formGroup]="farmForm" (ngSubmit)="onSubmit()" novalidate>
          <div class="mb-3">
            <label for="farm_name" class="form-label fw-semibold">Farm Name</label>
            <input
              id="farm_name"
              type="text"
              class="form-control"
              formControlName="farm_name"
              placeholder="e.g. Green Valley Farm"
              appTrimInput
              [appDisableWhileLoading]="submitting"
              aria-label="Farm name"
            />
            <div
              [appFormError]="farmForm.controls.farm_name"
              [appFormErrorMessages]="{
                required: 'Farm name is required.',
                minlength: 'Farm name must be at least 3 characters.',
                maxlength: 'Farm name must be 64 characters or less.'
              }"
            ></div>
          </div>

          <div class="mb-3">
            <label for="crop_type" class="form-label fw-semibold">Crop Type</label>
            <input
              id="crop_type"
              type="text"
              class="form-control"
              formControlName="crop_type"
              placeholder="e.g. Wheat"
              appTrimInput
              [appDisableWhileLoading]="submitting"
              aria-label="Crop type"
            />
            <div
              [appFormError]="farmForm.controls.crop_type"
              [appFormErrorMessages]="{
                required: 'Crop type is required.',
                minlength: 'Crop type must be at least 2 characters.',
                maxlength: 'Crop type must be 40 characters or less.'
              }"
            ></div>
          </div>

          <div class="mb-4">
            <label for="area_name" class="form-label fw-semibold">Area Name</label>
            <input
              id="area_name"
              type="text"
              class="form-control"
              formControlName="area_name"
              placeholder="e.g. County Antrim"
              appTrimInput
              [appDisableWhileLoading]="submitting"
              aria-label="Area name"
            />
            <div
              [appFormError]="farmForm.controls.area_name"
              [appFormErrorMessages]="{
                required: 'Area name is required.',
                minlength: 'Area name must be at least 2 characters.',
                maxlength: 'Area name must be 80 characters or less.'
              }"
            ></div>
          </div>

          @if (successMessage) {
            <div class="alert alert-success py-2" role="status">{{ successMessage }}</div>
          }

          <button type="submit" class="btn btn-success" [appDisableWhileLoading]="submitting" aria-label="Save farm">
            @if (submitting) {
              <span class="spinner-border spinner-border-sm me-1"></span>
              Saving...
            } @else {
              @if (isEditMode) {
                Save Changes
              } @else {
                Create Farm
              }
            }
          </button>
        </form>
      </div>
    </div>
  }
</div>
